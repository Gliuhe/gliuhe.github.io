<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级抽奖系统 - 豪华版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Marker Felt', 'Arial Rounded MT Bold', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a237e 0%, #4a148c 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 高级装饰元素 */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: -1;
        }
        
        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(5px);
        }
        
        .decoration-star {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid rgba(255, 215, 0, 0.3);
            transform: rotate(var(--rotation));
            filter: blur(2px);
        }
        
        /* 闪光效果 */
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 0 10px 2px gold;
            animation: sparkle-animation 2s infinite;
            opacity: 0;
        }
        
        @keyframes sparkle-animation {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25), 0 0 20px rgba(123, 31, 162, 0.5);
            width: 90%;
            max-width: 1000px;
            padding: 30px;
            margin-top: 20px;
            border: 3px solid #9c27b0;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff6b6b, #6b66ff, #66ffd9, #ff66a3);
            background-size: 300% 100%;
            animation: gradient-animation 5s ease infinite;
        }
        
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        
        .header h1 {
            color: #fff;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3), 0 0 10px rgba(123, 31, 162, 0.8);
            margin-bottom: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .header h1::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { transform: rotate(30deg) translateX(-100%); }
            100% { transform: rotate(30deg) translateX(100%); }
        }
        
        h2 {
            color: #9c27b0;
            margin: 20px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #9c27b0;
            font-size: 1.8rem;
            position: relative;
        }
        
        h2::after {
            content: "✨";
            position: absolute;
            right: 0;
            top: 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
            margin: 8px;
            box-shadow: 0 6px 12px rgba(123, 31, 162, 0.3);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.5);
            z-index: 1;
            text-decoration: none;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #7b1fa2, #512da8);
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(123, 31, 162, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            box-shadow: 0 6px 12px rgba(244, 67, 54, 0.3);
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            box-shadow: 0 8px 16px rgba(244, 67, 54, 0.4);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            box-shadow: 0 6px 12px rgba(255, 152, 0, 0.3);
            color: #fff;
        }
        
        .btn-warning:hover {
            background: linear-gradient(135deg, #f57c00, #e65100);
            box-shadow: 0 8px 16px rgba(255, 152, 0, 0.4);
        }
        
        .btn-premium {
            background: linear-gradient(135deg, #ffd700, #ff9800);
            box-shadow: 0 6px 12px rgba(255, 215, 0, 0.3);
            color: #333;
        }
        
        .btn-premium:hover {
            background: linear-gradient(135deg, #ffb700, #ff8c00);
            box-shadow: 0 8px 16px rgba(255, 215, 0, 0.4);
        }
        
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .form-group {
            margin: 18px 0;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
            font-size: 1.1rem;
            position: relative;
            padding-left: 15px;
        }
        
        label::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #9c27b0;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 1.1rem;
            transition: all 0.3s;
            background: #f8f9fa;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #9c27b0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(123, 31, 162, 0.2), inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25), 0 0 30px rgba(123, 31, 162, 0.3);
            border: 3px solid #9c27b0;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10001;
            margin: 0;
        }

        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #7b1fa2, #512da8);
        }
        
        @keyframes modal-appear {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .nav-tabs {
            display: flex;
            border-bottom: 3px solid #9c27b0;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }
        
        .nav-tab {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: bold;
            color: #777;
            font-size: 1.2rem;
            position: relative;
            transition: all 0.3s;
            margin: 0 5px;
            border-radius: 15px 15px 0 0;
            z-index: 1;
        }
        
        .nav-tab.active {
            color: #fff;
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            box-shadow: 0 -5px 10px rgba(0, 0, 0, 0.1);
        }
        
        .nav-tab.active::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ffd700;
            border-radius: 2px;
            display: block;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .today-summary {
            background: linear-gradient(135deg, #ffd700, #ff9800);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #ff8c00;
            color: #333;
            position: relative;
            overflow: hidden;
        }
        
        .today-summary span {
            color: #9c27b0;
            font-size: 1.8rem;
            margin: 0 5px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        
        .prize-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #9c27b0;
            transition: all 0.3s;
            position: relative;
            min-height: 220px;
            overflow: hidden;
        }
        
        .prize-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .prize-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        .prize-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #673ab7;
            margin-bottom: 8px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .prize-weight {
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .prize-stock {
            background: linear-gradient(135deg, #ffd700, #ff9800);
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .prize-description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .prize-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn-edit {
            background: linear-gradient(135deg, #06d6a0, #05b384);
            color: white;
        }

        .btn-edit:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(6, 214, 160, 0.4);
        }

        .record-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #9c27b0;
        }
        
        .record-prize {
            font-weight: bold;
            color: #673ab7;
            font-size: 1.2rem;
        }
        
        .record-date {
            color: #777;
            font-size: 0.9rem;
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            border: 3px solid #9c27b0;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .result-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #9c27b0;
            margin-bottom: 15px;
        }
        
        .result-content {
            font-size: 2rem;
            font-weight: bold;
            color: #673ab7;
            margin: 20px 0;
        }
        
        .reward-tag {
            background: linear-gradient(135deg, #ffd700, #ff9800);
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin: 5px;
        }
        
        .action-message {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            background: rgba(123, 31, 162, 0.1);
            color: #9c27b0;
        }
        
        /* 保底进度条样式 */
        progress {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            overflow: hidden;
        }
        
        progress::-webkit-progress-bar {
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        progress::-webkit-progress-value {
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        progress::-moz-progress-bar {
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            border-radius: 10px;
        }
        
        #counterAProgress::-webkit-progress-value {
            background: linear-gradient(135deg, #ff9800, #ff5722);
        }
        
        #counterAProgress::-moz-progress-bar {
            background: linear-gradient(135deg, #ff9800, #ff5722);
        }
        
        #counterBProgress::-webkit-progress-value {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
        }
        
        #counterBProgress::-moz-progress-bar {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
        }
        
        /* 移除价格自定义相关样式 */
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        /* 返回按钮 */
        .back-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #9c27b0, #673ab7);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            text-decoration: none;
        }
        
        .back-button:hover {
            transform: scale(1.1);
        }
        
        .status-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 25px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .status-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
        }
        
        .status-error {
            background: linear-gradient(135deg, #f44336, #c62828);
        }
        
        .status-warning {
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: #fff;
        }
        
        /* iPad 4:3 比例优化 (1024x768) */
        @media (max-width: 1024px) and (min-width: 769px) {
            .container {
                padding: 25px;
                width: 95%;
                max-width: 900px;
            }
            
            .prizes-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 15px;
            }
            
            .header h1 {
                font-size: 2.4rem;
                padding: 12px 25px;
            }
            
            .btn {
                padding: 16px 30px;
                font-size: 1.2rem;
                min-height: 55px;
            }
            
            .nav-tab {
                padding: 18px 20px;
                font-size: 1.3rem;
            }
            
            .today-summary {
                font-size: 1.3rem;
                padding: 25px;
            }
            
            .today-summary span {
                font-size: 2rem;
            }
            
            .action-buttons {
                gap: 12px;
            }
            
            .record-item {
                padding: 18px;
                font-size: 1.1rem;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                width: 95%;
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
            
            .nav-tabs {
                flex-wrap: wrap;
            }
            
            .nav-tab {
                flex: 1;
                text-align: center;
                padding: 12px 8px;
                font-size: 1rem;
                margin: 3px;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 90%;
                margin: 8px 0;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div id="decorations"></div>
    
    <div class="header">
        <h1>✨ 高级抽奖系统 ✨</h1>
    </div>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="window.location.href='/xiaoan'">🏠 返回主页</button>
        <button class="btn" onclick="window.location.href='index.html'">🎲 普通抽奖</button>
        <button class="btn" id="syncBtn" onclick="forceSyncFromCloud()">🔄 同步云端</button>
    </div>
    
    <div class="container">
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="lottery">🎡 豪华抽奖</div>
            <div class="nav-tab" data-tab="records">📝 抽奖记录</div>
            <div class="nav-tab" data-tab="management">⚙️ 高级设置</div>
        </div>
        
        <!-- 抽奖界面 -->
        <div id="lottery" class="tab-content active">
            <h2>豪华抽奖</h2>
            
            <!-- 货币显示 -->
            <div class="currency-display-container" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                <div class="today-summary" style="flex: 1; min-width: 200px;">
                    当前高级抽奖券: <span id="premiumAmount">0</span>
                </div>
                <div class="today-summary" style="flex: 1; min-width: 200px;">
                    当前兑换券: <span id="voucherAmount">0</span>
                </div>
            </div>
            
            <!-- 保底进度显示 -->
            <div class="guarantee-display" style="margin: 20px 0; background: rgba(156, 39, 176, 0.1); border-radius: 15px; padding: 15px;">
                <div class="guarantee-counter" style="margin-bottom: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <span style="font-weight: bold; color: #673ab7;">A类保底 (权重5-9):</span>
                        <span id="counterAText" style="font-weight: bold; color: #9c27b7;">0/10</span>
                    </div>
                    <progress max="10" value="0" id="counterAProgress" style="width: 100%; height: 20px; border-radius: 10px;"></progress>
                </div>
                <div class="guarantee-counter">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <span style="font-weight: bold; color: #673ab7;">B类保底 (权重1-4):</span>
                        <span id="counterBText" style="font-weight: bold; color: #9c27b7;">0/40</span>
                    </div>
                    <progress max="40" value="0" id="counterBProgress" style="width: 100%; height: 20px; border-radius: 10px;"></progress>
                </div>
            </div>

            <p id="lotteryHint">试试你的手气吧！每次抽奖消耗高级抽奖券</p>

            <!-- 奖品展示 -->
            <div class="prizes-grid" id="prizesContainer">
                <!-- 奖品将通过JavaScript动态添加 -->
            </div>
            
            <div class="action-buttons">
                <div class="action-message" id="actionMessage"></div>
                <button class="btn" id="startLotteryBtn">🎡 使用高级抽奖券抽奖</button>
                <button class="btn btn-premium" id="startVoucherLotteryBtn">🎫 使用兑换券抽奖</button>
            </div>
        </div>
        
        <!-- 抽奖记录 -->
        <div id="records" class="tab-content">
            <h2>抽奖记录</h2>
            <div class="action-buttons">
                <button class="btn btn-danger" id="clearRecordsBtn">清空记录</button>
                <button class="btn btn-warning" id="resetProgressBtn">重置进度</button>
            </div>
            
            <div class="rules-container" id="recordsList">
                <!-- 抽奖记录将通过JavaScript动态添加 -->
            </div>
        </div>
        
        <!-- 设置 -->
        <div id="management" class="tab-content">
            <h2>高级设置</h2>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../cloud-sync-helper.js"></script>
    <script>
        // 常量定义
        const LOTTERY_COST = 1; // 基础消耗，实际消耗根据奖池动态计算

        // 根据奖池类型获取高级抽奖券消耗
        function getPremiumCost(voucherPool, selectedPool) {
            const voucherLevel = POOL_LEVELS[voucherPool];
            const selectedLevel = POOL_LEVELS[selectedPool || voucherPool];

            // 只能降级,不能升级
            if (selectedLevel > voucherLevel) {
                // 不允许升级,按最高奖池消耗
                if (voucherPool === "diamond") return 3;
                if (voucherPool === "gold") return 2;
                return 1;
            }

            // 根据选中奖池等级返回消耗
            if (selectedPool === "diamond") return 3;
            if (selectedPool === "gold") return 2;
            return 1;
        }

        // 奖池配置
        const POOL_CONFIG = {
            normal: { threshold: 4000, name: "普通奖池", color: "#4caf50" },
            gold: { threshold: 10000, name: "黄金奖池", color: "#ff8c00" },
            diamond: { threshold: Infinity, name: "钻石奖池", color: "#006064" }
        };

        // 奖池等级映射
        const POOL_LEVELS = {
            normal: 1,
            gold: 2,
            diamond: 3
        };

        // 当前选中的奖池(用户可主动降级)
        let selectedPool = null;
        
        // 管理页奖池筛选状态（"all"表示全部）
        let managePoolFilter = "all";

        // 初始化奖池选择器
        function initPoolSelector() {
            // 移除旧的池选择器（如果存在）
            const existingSelector = document.getElementById('poolSelectorContainer');
            if (existingSelector) existingSelector.remove();

            const voucherAmount = parseInt(localStorage.getItem('voucher') || '0');
            const voucherPool = getCurrentPoolType(voucherAmount);
            const availablePools = getAvailablePools(voucherAmount);

            // 初始化selectedPool为当前奖池
            if (!selectedPool || POOL_LEVELS[selectedPool] > POOL_LEVELS[voucherPool]) {
                selectedPool = voucherPool;
            }

            const lotteryTab = document.getElementById('lottery');
            const prizesContainer = document.getElementById('prizesContainer');

            // 创建奖池选择器容器
            const selectorContainer = document.createElement('div');
            selectorContainer.id = 'poolSelectorContainer';
            selectorContainer.style.cssText = 'margin: 20px 0; background: linear-gradient(135deg, rgba(156, 39, 176, 0.1), rgba(103, 58, 183, 0.1)); border-radius: 15px; padding: 15px; border: 2px solid rgba(156, 39, 176, 0.3);';

            const label = document.createElement('div');
            label.style.cssText = 'text-align: center; font-weight: bold; color: #9c27b0; margin-bottom: 10px; font-size: 1.1rem;';
            label.textContent = '🎯 选择抽奖奖池';
            selectorContainer.appendChild(label);

            const buttonsContainer = document.createElement('div');
            buttonsContainer.style.cssText = 'display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;';

            availablePools.forEach(([poolType, config]) => {
                const discountRatio = getPoolDiscountRatio(voucherPool, poolType);
                const discountPercent = Math.round((1 - discountRatio) * 100);
                const isSelected = poolType === selectedPool;

                const button = document.createElement('button');
                button.className = `pool-selector-btn ${isSelected ? 'selected' : ''}`;
                button.dataset.pool = poolType;
                button.style.cssText = `
                    padding: 12px 20px;
                    border-radius: 15px;
                    border: 2px solid ${config.color};
                    background: ${isSelected ? `linear-gradient(135deg, ${config.color}, ${config.color}88)` : 'white'};
                    color: ${isSelected ? 'white' : config.color};
                    font-weight: bold;
                    cursor: pointer;
                    transition: all 0.3s;
                    min-width: 140px;
                    box-shadow: ${isSelected ? `0 4px 15px ${config.color}66` : 'none'};
                `;

                let discountText = discountPercent > 0 ? `<br><span style="font-size: 0.85rem; opacity: 0.9;">💰 立减${discountPercent}%</span>` : '';
                button.innerHTML = `${config.name}${discountText}`;

                if (poolType === voucherPool) {
                    const originalMark = document.createElement('div');
                    originalMark.style.cssText = 'font-size: 0.75rem; opacity: 0.8; margin-top: 2px;';
                    originalMark.textContent = '（当前等级）';
                    button.appendChild(originalMark);
                }

                button.addEventListener('click', () => selectPool(poolType));
                buttonsContainer.appendChild(button);
            });

            selectorContainer.appendChild(buttonsContainer);
            lotteryTab.insertBefore(selectorContainer, prizesContainer);
        }

        // 选择奖池
        function selectPool(poolType) {
            selectedPool = poolType;
            initPoolSelector();
            renderPrizes();
            updateCurrencyDisplay();

            const poolName = POOL_CONFIG[poolType].name;
            showNotification(`已切换到${poolName}`, 'success');
        }

        // 根据兑换券数量获取当前奖池类型
        function getCurrentPoolType(voucherAmount) {
            if (voucherAmount >= POOL_CONFIG.gold.threshold) return "diamond";
            if (voucherAmount >= POOL_CONFIG.normal.threshold) return "gold";
            return "normal";
        }

        // 获取奖池折扣率(每降一级25%)
        function getPoolDiscountRatio(voucherPool, selectedPool) {
            const voucherLevel = POOL_LEVELS[voucherPool];
            const selectedLevel = POOL_LEVELS[selectedPool];

            // 只能降级,不能升级
            if (selectedLevel > voucherLevel) {
                return 1; // 不允许升级,按原价
            }

            const levelDiff = voucherLevel - selectedLevel;
            // 每降一级减25个百分点（直接减去0.25）
            return Math.max(0.25, 1 - levelDiff * 0.25);
        }

        // 获取可用的奖池选项
        function getAvailablePools(voucherAmount) {
            const voucherPool = getCurrentPoolType(voucherAmount);
            const voucherLevel = POOL_LEVELS[voucherPool];

            // 返回当前及以下级别的奖池
            return Object.entries(POOL_CONFIG)
                .filter(([poolType, config]) => POOL_LEVELS[poolType] <= voucherLevel)
                .sort((a, b) => POOL_LEVELS[b[0]] - POOL_LEVELS[a[0]]); // 按等级降序
        }

        // 根据奖池类型过滤奖品
        function filterPrizesByPool(prizes, poolType) {
            // 如果奖品没有pool字段，默认为normal（兼容旧数据）
            return prizes.filter(prize => (prize.pool || "normal") === poolType);
        }

        // 默认奖品
        const defaultPrizes = [
            {

                rewardType: "item",
                weight: 20,
                stock: 5,
                description: "精美的豪华玩具熊，柔软舒适",

                rewardType: "item",

                icon: "🧩",
                pool: "normal"
            },
            {
                id: 3,
                name: "兑换券 x5",
                rewardType: "currency",
                weight: 30,
                stock: -1,
                currencyAmount: 5,
                description: "获得5张兑换券",
                icon: "🎫",
                pool: "normal"
            },
            {
                id: 4,
                name: "豪华遥控车",
                rewardType: "item",
                weight: 10,
                stock: 2,
                description: "高速遥控赛车，炫酷外观",
                icon: "🏎️",
                pool: "gold"
            },
            {
                id: 5,
                name: "兑换券 x20",
                rewardType: "currency",
                weight: 5,
                stock: -1,
                currencyAmount: 20,
                description: "获得20张兑换券",
                icon: "🎫",
                pool: "gold"
            },
            {
                id: 6,
                name: "神秘礼盒",
                rewardType: "item",
                weight: 8,
                stock: 1,
                description: "内含神秘惊喜",
                icon: "🎁",
                pool: "diamond"
            }
        ];
        
        // 全局变量
        let prizes = [];
        let records = [];
        let currencyAmount = 100;
        let isLotteryRunning = false;
        let counterA = 0; // A类保底计数器 (权重5-9)
        let counterB = 0; // B类保底计数器 (权重1-4)
        
        // DOM元素
        const prizesContainer = document.getElementById("prizesContainer");
        const managePrizesContainer = document.getElementById("managePrizesContainer");
        const recordsList = document.getElementById("recordsList");
        const premiumAmountElement = document.getElementById("premiumAmount");
        const voucherAmountElement = document.getElementById("voucherAmount");
        const startLotteryBtn = document.getElementById("startLotteryBtn");
        const startVoucherLotteryBtn = document.getElementById("startVoucherLotteryBtn");
        const actionMessage = document.getElementById("actionMessage");
        const resultCard = document.getElementById("resultCard");
        const resultContent = document.getElementById("resultContent");
        const rewardTags = document.getElementById("rewardTags");
        const confirmResultBtn = document.getElementById("confirmResultBtn");
        const addPrizeBtn = document.getElementById("addPrizeBtn");
        const clearRecordsBtn = document.getElementById("clearRecordsBtn");
        const resetProgressBtn = document.getElementById("resetProgressBtn");
        
        // 模态框元素
        const addPrizeModal = document.getElementById("addPrizeModal");
        const confirmAddPrizeBtn = document.getElementById("confirmAddPrizeBtn");
        const cancelAddPrizeBtn = document.getElementById("cancelAddPrizeBtn");
        
        // 表单元素
        const prizeName = document.getElementById("prizeName");
        const prizeWeight = document.getElementById("prizeWeight");
        const prizeStock = document.getElementById("prizeStock");
        const prizeRewardType = document.getElementById("prizeRewardType");
        const prizePool = document.getElementById("prizePool");
        const currencyAmountGroup = document.getElementById("currencyAmountGroup");
        const currencyAmountInput = document.getElementById("currencyAmountInput");
        const prizeDescription = document.getElementById("prizeDescription");
        
        // 密码验证元素
        const passwordModal = document.getElementById("passwordModal");
        const passwordInput = document.getElementById("passwordInput");
        const confirmPasswordBtn = document.getElementById("confirmPasswordBtn");
        const cancelPasswordBtn = document.getElementById("cancelPasswordBtn");
        
        // 密码设置
        // 从localStorage读取密码，与主页保持同步
        const getAdminPassword = () => {
            return localStorage.getItem('adminPassword') || "1234"; // 默认密码
        }; // 默认密码
        
        // 初始化
        function init() {
            createDecorations();
            loadData();
            initPoolSelector();
            renderPrizes();
            renderManagePrizes();
            renderRecords();
            updateCurrencyDisplay();
            updateCountersDisplay();
            addEventListeners();
        }
        
        // 创建装饰元素
        function createDecorations() {
            const decorations = document.getElementById("decorations");
            
            for (let i = 0; i < 15; i++) {
                const circle = document.createElement("div");
                circle.classList.add("decoration", "decoration-circle");
                circle.style.width = Math.random() * 100 + 50 + "px";
                circle.style.height = circle.style.width;
                circle.style.left = Math.random() * 100 + "vw";
                circle.style.top = Math.random() * 100 + "vh";
                circle.style.opacity = Math.random() * 0.3 + 0.1;
                decorations.appendChild(circle);
            }
            
            for (let i = 0; i < 20; i++) {
                const star = document.createElement("div");
                star.classList.add("decoration", "decoration-star");
                star.style.setProperty("--rotation", Math.random() * 360 + "deg");
                star.style.left = Math.random() * 100 + "vw";
                star.style.top = Math.random() * 100 + "vh";
                decorations.appendChild(star);
            }
            
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement("div");
                sparkle.classList.add("sparkle");
                sparkle.style.left = Math.random() * 100 + "vw";
                sparkle.style.top = Math.random() * 100 + "vh";
                sparkle.style.animationDelay = Math.random() * 5 + "s";
                decorations.appendChild(sparkle);
            }
        }
        
        // 加载数据
        function loadData() {
            prizes = localStorage.getItem("advancedPrizes") ? JSON.parse(localStorage.getItem("advancedPrizes")) : defaultPrizes;
            records = localStorage.getItem("advancedRecords") ? JSON.parse(localStorage.getItem("advancedRecords")) : [];
            currencyAmount = parseInt(localStorage.getItem("premium")) || 0;
            counterA = localStorage.getItem("advancedCounterA") ? parseInt(localStorage.getItem("advancedCounterA")) : 0;
            counterB = localStorage.getItem("advancedCounterB") ? parseInt(localStorage.getItem("advancedCounterB")) : 0;

            // 初始化银行券（检查是否为有效数字）
            const bankTicketValue = localStorage.getItem('bankTicket');
            if (!bankTicketValue || bankTicketValue === 'NaN' || isNaN(parseInt(bankTicketValue))) {
                localStorage.setItem('bankTicket', '0');
                console.log("[初始化] 银行券值无效，已重置为0");
            }

            window.addEventListener('storage', function(e) {
                if (e.key === 'premium') {
                    currencyAmount = parseInt(e.newValue);
                    localStorage.setItem('premium', currencyAmount.toString());
                    updateCurrencyDisplay();
                } else if (e.key === 'voucher') {
                    updateCurrencyDisplay();
                } else if (e.key === 'bankTicket') {
                    updateCurrencyDisplay();
                }
            });
        }
        
        // 保存数据
        function saveData() {
            localStorage.setItem("advancedPrizes", JSON.stringify(prizes));
            localStorage.setItem("advancedRecords", JSON.stringify(records));
            localStorage.setItem("advancedCounterA", counterA.toString());
            localStorage.setItem("advancedCounterB", counterB.toString());
        }
        
        // 渲染奖品
        function renderPrizes() {
            prizesContainer.innerHTML = "";

            const voucherAmount = parseInt(localStorage.getItem('voucher') || '0');
            const voucherPool = getCurrentPoolType(voucherAmount);

            // 使用selectedPool（用户选择的奖池）
            const poolType = selectedPool || voucherPool;
            const filteredPrizes = filterPrizesByPool(prizes, poolType);

            // 显示当前奖池信息 - 移到prizesContainer外部，在h2标题旁边
            const lotteryTab = document.querySelector('#lottery h2');
            if (lotteryTab && !lotteryTab.querySelector('.pool-info')) {
                const poolInfo = document.createElement('div');
                poolInfo.className = 'pool-info';
                poolInfo.style.cssText = 'display: inline-block; margin-left: 20px; padding: 12px 24px; border-radius: 20px; background: linear-gradient(135deg, #9c27b0, #673ab7); color: white; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4); vertical-align: middle;';
                poolInfo.innerHTML = `🎯 ${POOL_CONFIG[poolType].name}<br><span style="font-size: 0.95rem; opacity: 0.9;">兑换券: ${voucherAmount}</span>`;
                lotteryTab.appendChild(poolInfo);
            } else if (lotteryTab && lotteryTab.querySelector('.pool-info')) {
                const poolInfo = lotteryTab.querySelector('.pool-info');
                poolInfo.innerHTML = `🎯 ${POOL_CONFIG[poolType].name}<br><span style="font-size: 0.95rem; opacity: 0.9;">兑换券: ${voucherAmount}</span>`;
            }

            if (filteredPrizes.length === 0) {
                const noPrizes = document.createElement('div');
                noPrizes.style.cssText = 'text-align: center; padding: 30px; color: #666; font-size: 1.1rem;';
                noPrizes.textContent = '当前奖池暂无奖品，请添加奖品或提升兑换券数量';
                prizesContainer.appendChild(noPrizes);
                return;
            }

            filteredPrizes.forEach(prize => {
                if (prize.stock !== 0) {
                    const prizeCard = document.createElement("div");
                    prizeCard.classList.add("prize-card");
                    prizeCard.innerHTML = `
                        <div class="prize-icon">${prize.icon || "🎁"}</div>
                        <div class="prize-name">${prize.name}</div>
                        <div class="prize-weight">权重: ${prize.weight}</div>
                        <div class="prize-stock">库存: ${prize.stock === -1 ? "无限" : prize.stock}</div>
                        <div class="prize-description">${prize.description || ""}</div>
                    `;
                    prizesContainer.appendChild(prizeCard);
                }
            });
        }
        
        // 初始化管理页奖池筛选器
        function initManagePoolFilter() {
            const filterContainer = document.getElementById('managePoolFilter');
            if (!filterContainer) return;
            
            filterContainer.innerHTML = '';
            
            // 统计各奖池奖品数量
            const poolCounts = {
                all: prizes.length,
                normal: prizes.filter(p => (p.pool || "normal") === "normal").length,
                gold: prizes.filter(p => p.pool === "gold").length,
                diamond: prizes.filter(p => p.pool === "diamond").length
            };
            
            // 创建"全部"按钮
            const allBtn = document.createElement('button');
            allBtn.className = `pool-filter-btn ${managePoolFilter === 'all' ? 'selected' : ''}`;
            allBtn.dataset.pool = 'all';
            allBtn.style.cssText = `
                padding: 12px 20px;
                border-radius: 15px;
                border: 2px solid #9c27b0;
                background: ${managePoolFilter === 'all' ? 'linear-gradient(135deg, #9c27b0, #673ab7)' : 'white'};
                color: ${managePoolFilter === 'all' ? 'white' : '#9c27b0'};
                font-weight: bold;
                cursor: pointer;
                transition: all 0.3s;
                min-width: 120px;
            `;
            allBtn.innerHTML = `📋 全部<br><span style="font-size: 0.85rem; opacity: 0.9;">(${poolCounts.all}个)</span>`;
            allBtn.addEventListener('click', () => {
                managePoolFilter = 'all';
                initManagePoolFilter();
                renderManagePrizes();
            });
            filterContainer.appendChild(allBtn);
            
            // 创建各奖池筛选按钮
            Object.entries(POOL_CONFIG).forEach(([poolType, config]) => {
                const btn = document.createElement('button');
                btn.className = `pool-filter-btn ${managePoolFilter === poolType ? 'selected' : ''}`;
                btn.dataset.pool = poolType;
                btn.style.cssText = `
                    padding: 12px 20px;
                    border-radius: 15px;
                    border: 2px solid ${config.color};
                    background: ${managePoolFilter === poolType ? `linear-gradient(135deg, ${config.color}, ${config.color}88)` : 'white'};
                    color: ${managePoolFilter === poolType ? 'white' : config.color};
                    font-weight: bold;
                    cursor: pointer;
                    transition: all 0.3s;
                    min-width: 120px;
                `;
                
                const icon = poolType === 'diamond' ? '💎' : poolType === 'gold' ? '🥇' : '🥉';
                btn.innerHTML = `${icon} ${config.name}<br><span style="font-size: 0.85rem; opacity: 0.9;">(${poolCounts[poolType]}个)</span>`;
                btn.addEventListener('click', () => {
                    managePoolFilter = poolType;
                    initManagePoolFilter();
                    renderManagePrizes();
                });
                filterContainer.appendChild(btn);
            });
        }

        // 渲染管理奖品
        function renderManagePrizes() {
            managePrizesContainer.innerHTML = "";
            
            // 初始化筛选器
            initManagePoolFilter();

            // 根据筛选条件过滤奖品
            let filteredPrizes = prizes;
            if (managePoolFilter !== 'all') {
                filteredPrizes = prizes.filter(prize => (prize.pool || "normal") === managePoolFilter);

        // 保底抽奖函数
        function drawGuaranteedPrize(minWeight, maxWeight, isGuaranteedType, poolPrizes = null) {
            const prizesToUse = poolPrizes || prizes;
            const eligiblePrizes = prizesToUse.filter(prize =>
                prize.stock !== 0 && prize.weight >= minWeight && prize.weight < maxWeight
            );
            
            if (eligiblePrizes.length === 0) {
                const currentVoucherAmount = parseInt(localStorage.getItem('voucher') || '0');
                const currencyAmount = Math.max(1, Math.round(
                    currentVoucherAmount * (isGuaranteedType === 'A' ? 0.40 : 1.15)
                ));
                
                return {
                    id: Date.now(),
                    name: `保底兑换券 x${currencyAmount}`,
                    rewardType: "currency",
                    weight: isGuaranteedType === 'A' ? 5 : 1,
                    stock: -1,
                    currencyAmount: currencyAmount,
                    description: `保底奖励：${currencyAmount}张兑换券`,
                    icon: "🎫"
                };
            }
            
            return eligiblePrizes[Math.floor(Math.random() * eligiblePrizes.length)];
        }
        
        // 抽奖算法
        function drawPrize() {
            counterA++;
            counterB++;
            updateCountersDisplay();

            const voucherAmount = parseInt(localStorage.getItem('voucher') || '0');
            const voucherPool = getCurrentPoolType(voucherAmount);
            const poolType = selectedPool || voucherPool;
            const poolPrizes = filterPrizesByPool(prizes, poolType);

            // 优先检查B类保底（每40次，权重1-4）
            if (counterB >= 40) {
                const prize = drawGuaranteedPrize(1, 5, 'B', poolPrizes);
                counterB = 0;
                updateCountersDisplay();
                return { prize: prize, isGuaranteed: true };
            }

            // 然后检查A类保底（每10次，权重5-9）
            if (counterA >= 10) {
                const prize = drawGuaranteedPrize(5, 10, 'A', poolPrizes);
                counterA = 0;
                updateCountersDisplay();
                return { prize: prize, isGuaranteed: true };
            }

            const eligiblePrizes = poolPrizes.filter(prize => prize.stock !== 0);
            if (eligiblePrizes.length === 0) return null;

            const totalWeight = eligiblePrizes.reduce((sum, prize) => sum + prize.weight, 0);
            let random = Math.random() * totalWeight;

            for (const prize of eligiblePrizes) {
                if (random <= prize.weight) {
                    return { prize: prize, isGuaranteed: false };
                }
                random -= prize.weight;
            }

            return { prize: eligiblePrizes[0], isGuaranteed: false };
        }


        
        // 显示抽奖结果
        function showResult(prize, isGuaranteed = false) {
            resultContent.textContent = `${prize.icon || "🎁"} ${prize.name}`;
            
            rewardTags.innerHTML = "";
            
            // 添加保底提示
            if (isGuaranteed) {
                const guaranteedTag = document.createElement("div");
                guaranteedTag.classList.add("reward-tag");
                guaranteedTag.style.background = "linear-gradient(135deg, #ffd700, #ff9800)";
                guaranteedTag.style.color = "#333";
                guaranteedTag.textContent = "🎯 保底奖励";
                rewardTags.appendChild(guaranteedTag);
            }
            
            if (prize.rewardType === "currency") {
                const tag = document.createElement("div");
                tag.classList.add("reward-tag");
                tag.textContent = `获得 ${prize.currencyAmount || 0} 兑换券`;
                rewardTags.appendChild(tag);
            } else if (prize.rewardType === "bankTicket") {
                const tag = document.createElement("div");
                tag.classList.add("reward-tag");
                tag.style.background = "linear-gradient(135deg, #ff6b9d 0%, #ff9a9e 100%)";
                tag.textContent = `获得 ${prize.currencyAmount || 0} 银行券`;
                rewardTags.appendChild(tag);
            } else if (prize.rewardType === "jixing") {
                const tag = document.createElement("div");
                tag.classList.add("reward-tag");
                tag.style.background = "linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%)";
                tag.textContent = `获得 ${prize.currencyAmount || 0} 纪行券`;
                rewardTags.appendChild(tag);
            }
            
            // 检查并重置保底计数器
            if (prize.weight >= 5 && prize.weight < 10) {
                counterA = 0;
                if (!isGuaranteed) showNotification("🎉 触发A类保底重置！", "success");
            } else if (prize.weight >= 1 && prize.weight < 5) {
                counterB = 0;
                if (!isGuaranteed) showNotification("🎉 触发B类保底重置！", "success");
            }
            
            // 如果是保底奖励，显示保底提示
            if (isGuaranteed) {
                if (prize.weight >= 5 && prize.weight < 10) {
                    showNotification("🎯 A类保底触发！获得权重5-9的奖品", "success");
                } else if (prize.weight >= 1 && prize.weight < 5) {
                    showNotification("🎯 B类保底触发！获得权重1-4的奖品", "success");
                }
            }
            
            // 更新保底进度显示
            updateCountersDisplay();
            
            resultCard.style.display = "block";
            
            // 添加纸屑效果
            createConfetti();
        }
        
        // 创建纸屑效果
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement("div");
                confetti.style.position = "fixed";
                confetti.style.width = "10px";
                confetti.style.height = "10px";
                confetti.style.backgroundColor = getRandomColor();
                confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
                confetti.style.left = Math.random() * 100 + "vw";
                confetti.style.top = "-10px";
                confetti.style.zIndex = "1000";
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                document.body.appendChild(confetti);
                
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                
                confetti.animate(
                    [
                        { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                        { transform: `translate(${Math.random() * 100 - 50}px, ${window.innerHeight}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                    ],
                    {
                        duration: duration * 1000,
                        delay: delay * 1000,
                        easing: "cubic-bezier(0.25, 1, 0.5, 1)"
                    }
                );
                
                setTimeout(() => document.body.removeChild(confetti), (duration + delay) * 1000);
            }
        }

        // 添加奖品
        function addPrize() {
            if (!prizeName.value) {
                showNotification("请输入奖品名称", "error");
                return;
            }
            
            if ((prizeRewardType.value === "currency" || prizeRewardType.value === "bankTicket" || prizeRewardType.value === "jixing") && (!currencyAmountInput.value || parseInt(currencyAmountInput.value) <= 0)) {
                let currencyName = "兑换券";
                if (prizeRewardType.value === "bankTicket") currencyName = "银行券";
                else if (prizeRewardType.value === "jixing") currencyName = "纪行券";
                showNotification(`请输入有效的${currencyName}数量`, "error");
                return;
            }
            
            // 创建奖品对象
            const newPrize = {
                id: Date.now(),
                name: prizeName.value,
                rewardType: prizeRewardType.value,
                weight: parseInt(prizeWeight.value),
                stock: parseInt(prizeStock.value),
                description: prizeDescription.value,
                icon: getRandomIcon(),
                pool: prizePool.value || "normal" // 默认为普通奖池
            };

            // 如果是兑换券或银行券奖励，添加对应数量
            if (prizeRewardType.value === "currency" || prizeRewardType.value === "bankTicket") {
                newPrize.currencyAmount = parseInt(currencyAmountInput.value);
            }


            
            
            // 添加奖品
            prizes.push(newPrize);
            
            // 保存数据
            saveData();
            
            // 更新界面
            renderPrizes();
            renderManagePrizes();
            
            // 关闭模态框
            addPrizeModal.style.display = "none";
            
            // 显示通知
            showNotification("奖品添加成功", "success");
        }

            const icons = ["🎁", "🧸", "🚗", "🎮", "🎨", "📱", "🎧", "🎭", "🎪", "🎯", "🎲", "🎫", "🏆", "🎖️", "🎟️", "💎", "👑", "🧩", "🎠", "🎡"];
            return icons[Math.floor(Math.random() * icons.length)];

        // 编辑奖品相关
        let editingPrizeId = null; // 当前编辑的奖品ID

        // 打开编辑奖品模态框
        function openEditPrizeModal(prizeId) {
            const prize = prizes.find(p => p.id === prizeId);

            if (!prize) {
                showNotification("奖品不存在", "error");
                return;
            }

            editingPrizeId = prizeId;

            // 设置模态框标题和按钮文本
            document.getElementById('prizeModalTitle').textContent = '编辑奖品';
            document.getElementById('confirmAddPrizeBtn').textContent = '保存修改';

            // 填充奖品信息
            prizeName.value = prize.name;
            prizeWeight.value = prize.weight;
            prizeStock.value = prize.stock;
            prizeRewardType.value = prize.rewardType;
            prizeDescription.value = prize.description || "";
            prizePool.value = prize.pool || "normal";

            // 显示货币数量输入框（如果需要）
            if (prize.rewardType === "currency" || prize.rewardType === "bankTicket" || prize.rewardType === "jixing") {
                currencyAmountGroup.style.display = "block";
                currencyAmountInput.value = prize.currencyAmount || 0;
            } else {
                currencyAmountGroup.style.display = "none";
            }

            // 显示模态框
            addPrizeModal.style.display = "block";
        }

        // 编辑奖品
        function editPrize() {
            if (!prizeName.value) {
                showNotification("请输入奖品名称", "error");
                return;
            }

            if ((prizeRewardType.value === "currency" || prizeRewardType.value === "bankTicket" || prizeRewardType.value === "jixing") && (!currencyAmountInput.value || parseInt(currencyAmountInput.value) <= 0)) {
                let currencyName = "兑换券";
                if (prizeRewardType.value === "bankTicket") currencyName = "银行券";
                else if (prizeRewardType.value === "jixing") currencyName = "纪行券";
                showNotification(`请输入有效的${currencyName}数量`, "error");
                return;
            }

            const prizeIndex = prizes.findIndex(p => p.id === editingPrizeId);

            if (prizeIndex === -1) {
                showNotification("奖品不存在", "error");
                return;
            }

            // 更新奖品信息（保留原来的图标）
            prizes[prizeIndex] = {
                ...prizes[prizeIndex],
                name: prizeName.value,
                rewardType: prizeRewardType.value,
                weight: parseInt(prizeWeight.value),
                stock: parseInt(prizeStock.value),
                description: prizeDescription.value,
                pool: prizePool.value || "normal"
            };

            // 如果是兑换券或银行券奖励，更新对应数量
            if (prizeRewardType.value === "currency" || prizeRewardType.value === "bankTicket") {
                prizes[prizeIndex].currencyAmount = parseInt(currencyAmountInput.value);
            }

            // 保存数据
            saveData();

            // 更新界面
            renderPrizes();
            renderManagePrizes();

            // 关闭模态框
            addPrizeModal.style.display = "none";

            editingPrizeId = null;

            // 显示通知
            showNotification("奖品修改成功", "success");
        }

            setTimeout(() => {

                notification.style.transform = "translateY(-20px)";
            }, 3000);

        // ========== 云端数据同步 ==========
        // 使用 cloud-sync-helper.js 中已定义的 USER_ID
        
        async function loadDataFromCloud() {
            if (!window.supabase) {
                console.warn('[AdvancedChoujiang] Supabase SDK 未加载');
                return;
            }
            
            try {
                const sb = window.supabase.createClient(
                    'https://qhnudlhpwmdzdxufcqjc.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFobnVkbGhwd21kemR4dWZjcWpjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTYzNzgzNSwiZXhwIjoyMDkxMjEzODM1fQ.WuH9mFVKKKQGFwjHBFO4NQhs6mL0oVRVlAlzGR5GYqc'
                );
                
                console.log('[AdvancedChoujiang] 📥 正在从云端加载数据...');
                
                // 并行加载货币和抽奖记录
                const [{ data: currencies }, { data: lotteryRecords }] = await Promise.all([
                    sb.from('user_currencies').select('*').eq('user_id', USER_ID),
                    sb.from('lottery_records').select('*').eq('user_id', USER_ID)
                ]);
                
                let hasUpdate = false;
                
                // 同步货币 - 修复：只要云端有数据就使用云端值
                if (currencies && currencies.length > 0) {
                    currencies.forEach(row => {
                        const key = row.currency_type;
                        if (['voucher', 'lottery', 'premium', 'bankTicket'].includes(key)) {
                            const cloudVal = parseFloat(row.amount) || 0;
                            const localRaw = localStorage.getItem(key);
                            const localVal = localRaw !== null ? parseFloat(localRaw) : null;
                            
                            // 本地为空 或 云端值与本地值不同，都更新
                            if (localVal === null || isNaN(localVal) || cloudVal !== localVal) {
                                localStorage.setItem(key, String(cloudVal));
                                console.log(`[AdvancedChoujiang] 💰 同步货币 ${key}: ${localVal} → ${cloudVal}`);
                                hasUpdate = true;
                            }
                        }
                    });
                }
                
                // 同步高级抽奖记录
                if (lotteryRecords && lotteryRecords.length > 0) {
                    const advancedRecords = lotteryRecords.filter(r => r.pool_type === 'advanced');
                    
                    // 转换格式并保存
                    const advancedFormatted = advancedRecords.map(r => ({
                        prize: { name: r.prize_name, rewardType: 'item' },
                        date: r.prize_date,
                        used: r.used || false,
                        rewardType: 'item'
                    }));
                    
                    // 检查本地是否有记录，如果没有或云端更多，则使用云端
                    const localAdvanced = JSON.parse(localStorage.getItem('advancedRecords') || '[]');
                    
                    if (advancedFormatted.length > localAdvanced.length) {
                        localStorage.setItem('advancedRecords', JSON.stringify(advancedFormatted));
                        console.log(`[AdvancedChoujiang] 🎁 同步高级抽奖记录: ${localAdvanced.length} → ${advancedFormatted.length}`);
                        hasUpdate = true;
                    }
                }
                
                console.log('[AdvancedChoujiang] ✅ 云端数据同步完成');
                
                // 如果有更新，刷新UI
                if (hasUpdate) {
                    updateCurrencyDisplay();
                    updateAdvancedRecords();
                }
                
            } catch (e) {
                console.error('[AdvancedChoujiang] ❌ 云端同步失败:', e);
            }
        }
        
        // 强制从云端同步数据
        async function forceSyncFromCloud() {
            const btn = document.getElementById('syncBtn');
            if (btn) {
                btn.disabled = true;
                btn.textContent = '🔄 同步中...';
            }
            
            console.log('[AdvancedChoujiang] 🔄 强制从云端同步...');
            
            try {
                // 清除本地货币数据，强制从云端重新加载
                localStorage.removeItem('voucher');
                localStorage.removeItem('lottery');
                localStorage.removeItem('premium');
                localStorage.removeItem('bankTicket');
                
                await loadDataFromCloud();
                
                // 显示成功提示
                const notification = document.createElement('div');
                notification.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,0.95);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeInDown 0.3s ease;';
                notification.textContent = '✅ 云端同步完成！';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
                
            } catch(e) {
                console.error('[AdvancedChoujiang] 强制同步失败:', e);
                const notification = document.createElement('div');
                notification.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,0.95);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeInDown 0.3s ease;';
                notification.textContent = '❌ 同步失败: ' + e.message;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🔄 同步云端';
                }
            }
        }
        
        // 确保DOM加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
            // 从云端加载数据
            loadDataFromCloud();
        });
    </script>
