<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童抽奖乐园 - 完整版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Marker Felt', 'Arial Rounded MT Bold', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #83a4d4 0%, #b6fbff 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 1000px;
            padding: 30px;
            margin-top: 20px;
            border: 3px solid #ffd166;
            position: relative;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        
        .header h1 {
            color: #e74c3c;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            background: linear-gradient(to right, #ffd166, #ff9e7d);
        }
        
        .header::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 4px;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4);
            border-radius: 2px;
        }
        
        h2 {
            color: #06d6a0;
            margin: 20px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #ffd166;
            font-size: 1.8rem;
        }
        
        .btn {
            background: #06d6a0;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
            margin: 8px;
            box-shadow: 0 6px 12px rgba(6, 214, 160, 0.3);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .btn:hover {
            background: #05c191;
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(6, 214, 160, 0.4);
        }
        
        .btn::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(30deg);
            transition: all 0.5s;
        }
        
        .btn:hover::after {
            transform: rotate(30deg) translate(10%, 10%);
        }
        
        .btn-danger {
            background: #ff6b6b;
            box-shadow: 0 6px 12px rgba(255, 107, 107, 0.3);
        }
        
        .btn-danger:hover {
            background: #ff5252;
            box-shadow: 0 8px 16px rgba(255, 107, 107, 0.4);
        }
        
        .btn-warning {
            background: #ffd166;
            box-shadow: 0 6px 12px rgba(255, 209, 102, 0.3);
            color: #333;
        }
        
        .btn-warning:hover {
            background: #ffc745;
            box-shadow: 0 8px 16px rgba(255, 209, 102, 0.4);
        }
        
        .btn-premium {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            box-shadow: 0 6px 12px rgba(155, 89, 182, 0.3);
        }
        
        .btn-premium:hover {
            background: linear-gradient(135deg, #8e44ad, #6c3483);
            box-shadow: 0 8px 16px rgba(155, 89, 182, 0.4);
        }
        
        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .form-group {
            margin: 18px 0;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
            font-size: 1.1rem;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 1.1rem;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #06d6a0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(6, 214, 160, 0.2);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            border: 3px solid #ffd166;
            position: relative;
        }
        
        .modal-content::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid #06d6a0;
            border-radius: 30px;
            z-index: -1;
            opacity: 0.5;
        }
        
        .rules-container {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 25px;
            margin: 25px 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 2px solid #ffd166;
        }
        
        .prize-item {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #06d6a0;
            position: relative;
            transition: all 0.3s;
        }
        
        .prize-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .prize-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .prize-title {
            font-size: 1.4rem;
            color: #118ab2;
            font-weight: bold;
        }
        
        .prize-reward {
            background: #ffd166;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .prize-content {
            line-height: 1.6;
            color: #555;
            font-size: 1.1rem;
        }
        
        .prize-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .prize-actions .btn {
            padding: 8px 15px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        
        .status-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 25px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .status-success {
            background: #06d6a0;
        }
        
        .status-error {
            background: #ff6b6b;
        }
        
        .status-warning {
            background: #ffd166;
            color: #333;
        }
        
        .nav-tabs {
            display: flex;
            border-bottom: 3px solid #ffd166;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .nav-tab {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: bold;
            color: #777;
            font-size: 1.2rem;
            position: relative;
            transition: all 0.3s;
            margin: 0 5px;
            border-radius: 15px 15px 0 0;
        }
        
        .nav-tab.active {
            color: #118ab2;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 -5px 10px rgba(0, 0, 0, 0.05);
        }
        
        .nav-tab.active::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #06d6a0;
            border-radius: 2px;
            display: block;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .today-summary {
            background: #ffd166;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #ffb703;
        }
        
        .today-summary span {
            color: #ff6b6b;
            font-size: 1.5rem;
            margin: 0 5px;
        }
        
        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        
        .prize-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #ffd166;
            transition: all 0.3s;
            position: relative;
            min-height: 220px;
        }
        
        .prize-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .prize-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        
        .prize-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #118ab2;
            margin-bottom: 8px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .prize-weight {
            background: #06d6a0;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .prize-stock {
            background: #ffd166;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .prize-description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
            min-height: 40px;
        }
        
        .record-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .record-prize {
            font-weight: bold;
            color: #118ab2;
            font-size: 1.2rem;
        }
        
        .record-date {
            color: #777;
            font-size: 0.9rem;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: confetti-fall 1.5s ease-in-out forwards;
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            border: 3px solid #ffd166;
            max-width: 850px;
            width: 90%;
        }
        
        .result-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 15px;
        }
        
        .result-content {
            font-size: 2rem;
            font-weight: bold;
            color: #118ab2;
            margin: 20px 0;
        }
        
        .reward-tag {
            background: #ffd166;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin: 5px;
            box-shadow: 0 3px 8px rgba(255, 209, 102, 0.3);
        }
        
        .action-message {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            background: rgba(6, 214, 160, 0.1);
            color: #06d6a0;
        }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes prizeUsed {
            0% { 
                transform: scale(1);
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 8px 20px rgba(6, 214, 160, 0.4);
                background: linear-gradient(135deg, #ffd166, #ff9e7d);
            }
            100% { 
                transform: scale(1);
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            }
        }
        
        @keyframes buttonBounce {
            0%, 20%, 60%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            80% { transform: translateY(-5px); }
        }
        
        .pulse {
            animation: pulse 1.5s infinite;
        }
        
        .bounce {
            animation: buttonBounce 0.6s ease;
        }
        
        .prize-delete {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ff6b6b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            z-index: 10;
        }
        
        .prize-delete:hover {
            transform: scale(1.1);
            background: #ff4040;
        }

        .prize-edit {
            position: absolute;
            top: -10px;
            right: 35px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #06d6a0;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            z-index: 10;
        }

        .prize-edit:hover {
            transform: scale(1.1);
            background: #05b384;
        }

        .stock-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 1;
        }
        
        .delete-confirm {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 5;
        }
        
        .prize-card:hover .delete-confirm {
            opacity: 1;
        }
        
        .delete-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                width: 95%;
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
            
            .nav-tabs {
                flex-wrap: wrap;
            }
            
            .nav-tab {
                flex: 1;
                text-align: center;
                padding: 12px 8px;
                font-size: 1rem;
                margin: 3px;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 90%;
                margin: 8px 0;
            }
            
            .prizes-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 1024px) {
            #resultContent > div {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            #resultContent > div {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .prizes-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .prize-card {
                min-height: auto;
            }
            
            .prize-delete {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎪 儿童抽奖乐园 🎪</h1>
        <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="btn btn-warning" id="homeBtn">返回主页</button>
            <button class="btn btn-premium" id="advancedBtn">✨ 前往高级抽奖</button>
            <button class="btn btn-info" id="syncBtn">🔄 同步云端</button>
        </div>
    </div>
    
    <div class="container">
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="lottery">🎡 欢乐抽奖</div>
            <div class="nav-tab" data-tab="records">📝 抽奖记录</div>
            <div class="nav-tab" data-tab="management">⚙️ 设置</div>
        </div>
        
        <!-- 抽奖界面 -->
        <div id="lottery" class="tab-content active">
            <h2>欢乐抽奖</h2>
            
            <!-- 兑换券显示 -->
            <div class="today-summary" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>当前兑换券: <span id="currencyAmount">100</span></div>
                <div>当前抽奖券: <span id="ticketAmount">0</span></div>
            </div>
            
            <p>每次抽奖消耗 1 抽奖券，试试你的手气吧！</p>
            
            <!-- 奖品展示 -->
            <div class="prizes-grid" id="prizesContainer">
                <!-- 奖品将通过JavaScript动态添加 -->
            </div>
            
            <div class="action-buttons">
                <div class="action-message" id="actionMessage"></div>
                <div class="lottery-buttons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;">
                    <button class="btn btn-warning pulse" id="singleLotteryBtn">🎟️ 1抽奖券抽1次</button>
                    <button class="btn btn-premium pulse" id="multiLotteryBtn">🎟️🎟️ 10抽奖券抽10次</button>
                </div>
            </div>
            
            <!-- 兑换券购买确认模态框 -->
            <div class="modal" id="exchangeModal">
                <div class="modal-content">
                    <h2 id="exchangeModalTitle">兑换券购买确认</h2>
                    <p id="exchangeModalText">确定要用200兑换券购买1张抽奖券吗？</p>
                    <div class="action-buttons">
                        <button class="btn" id="confirmExchangeBtn">确认购买</button>
                        <button class="btn btn-danger" id="cancelExchangeBtn">取消</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 抽奖记录 -->
        <div id="records" class="tab-content">
            <h2>抽奖记录</h2>
            <div class="action-buttons">
                <button class="btn btn-danger" id="clearRecordsBtn">清空记录</button>
            </div>
            
            <div class="rules-container" id="recordsList">
                <!-- 抽奖记录将通过JavaScript动态添加 -->
            </div>
        </div>
        
        <!-- 设置 -->
        <div id="management" class="tab-content">
            <h2>设置</h2>
            <button class="btn pulse" id="addPrizeBtn">➕ 添加新奖品</button>
            
            <div class="prizes-grid" id="managePrizesContainer">
                <!-- 管理奖品将通过JavaScript动态添加 -->
            </div>
        </div>
        
        <!-- 抽奖结果卡片 -->
        <div class="result-card" id="resultCard" style="display:none;">
            <div class="result-title">恭喜你获得了</div>
            <div class="result-content" id="resultContent"></div>
            <div id="rewardTags"></div>
            <button class="btn" id="confirmResultBtn">确定</button>
        </div>
    </div>
    
    <!-- 模态框部分 -->
    <!-- 添加奖品模态框 -->
    <div class="modal" id="addPrizeModal">
        <div class="modal-content">
            <h2 id="prizeModalTitle">添加新奖品</h2>
            <div class="form-group">
                <label for="prizeName">奖品名称</label>
                <input type="text" id="prizeName" placeholder="例如：玩具小熊">
            </div>
            <div class="form-group">
                <label for="prizeWeight">奖品权重</label>
                <input type="number" id="prizeWeight" min="1" value="10" placeholder="权重越高，中奖概率越大">
            </div>
            <div class="form-group">
                <label for="prizeStock">库存（-1为无限）</label>
                <input type="number" id="prizeStock" min="-1" value="-1">
            </div>
            <div class="form-group">
                <label for="prizeRewardType">奖励类型</label>
                <select id="prizeRewardType">
                    <option value="item">实物奖品</option>
                    <option value="currency">兑换券</option>
                    <option value="bankTicket">银行券</option>
                </select>
            </div>
            <div class="form-group" id="currencyAmountGroup" style="display:none;">
                <label id="currencyAmountLabel">兑换券数量</label>
                <input type="number" id="currencyAmountInput" min="1" placeholder="请输入兑换券数量">
            </div>
            <div class="form-group" id="usableGroup">
                <label for="prizeUsable">是否可使用</label>
                <select id="prizeUsable">
                    <option value="true">✅ 可使用（中奖后显示使用按钮）</option>
                    <option value="false">❌ 不可使用（仅记录，无使用按钮）</option>
                </select>
            </div>
            <div class="form-group">
                <label for="prizeDescription">奖品描述</label>
                <textarea id="prizeDescription" placeholder="请输入奖品描述"></textarea>
            </div>
            <button class="btn" id="confirmAddPrizeBtn">添加奖品</button>
            <button class="btn btn-danger" id="cancelAddPrizeBtn">取消</button>
        </div>
    </div>
    
    <!-- 密码验证模态框 -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h2>密码验证</h2>
            <div class="form-group">
                <label for="passwordInput">请输入密码</label>
                <input type="password" id="passwordInput" placeholder="请输入密码">
            </div>
            <button class="btn" id="confirmPasswordBtn">验证</button>
            <button class="btn btn-danger" id="cancelPasswordBtn">取消</button>
        </div>
    </div>
    
    <!-- 清空记录密码验证模态框 -->
    <div class="modal" id="clearRecordsModal">
        <div class="modal-content">
            <h2>密码验证</h2>
            <div class="form-group">
                <label for="clearRecordsPassword">请输入密码</label>
                <input type="password" id="clearRecordsPassword" placeholder="请输入密码">
            </div>
            <button class="btn" id="confirmClearRecordsBtn">确认清空</button>
            <button class="btn btn-danger" id="cancelClearRecordsBtn">取消</button>
        </div>
    </div>
    
    <!-- 状态通知 -->
    <div class="status-notification" id="statusNotification"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../cloud-sync-helper.js"></script>
    <script>
        // 常量定义
        const DEFAULT_PASSWORD = "1234";
const LOTTERY_COST = 10;  // 抽奖消耗的兑换券
const EXCHANGE_RATE = 200; // 200兑换券=1抽奖券
        let lotteryTickets = 0;   // 当前抽奖券数量
        
        // 默认奖品
        const defaultPrizes = [
            {
                id: 1,
                name: "玩具小熊",
                rewardType: "item",
                currencyAmount: 0,
                description: "可爱的毛绒小熊玩具",
                icon: "🧸",
                weight: 10,
                stock: 10
            },
            {
                id: 2,
                name: "兑换券奖励",
                rewardType: "currency",
                currencyAmount: 20,
                description: "20张兑换券",
                icon: "🎟️",
                weight: 20,
                stock: -1  // 无限库存
            },
            {
                id: 3,
                name: "故事书",
                rewardType: "item",
                currencyAmount: 0,
                description: "精美绘本故事书",
                icon: "📚",
                weight: 15,
                stock: 5
            },
            {
                id: 4,
                name: "兑换券奖励",
                rewardType: "currency",
                currencyAmount: 50,
                description: "50张兑换券",
                icon: "🎟️",
                weight: 5,
                stock: -1  // 无限库存
            },
            {
                id: 5,
                name: "拼图",
                rewardType: "item",
                currencyAmount: 0,
                description: "100片精美拼图",
                icon: "🧩",
                weight: 15,
                stock: 8
            },
            {
                id: 6,
                name: "贴纸包",
                rewardType: "item",
                currencyAmount: 0,
                description: "卡通主题贴纸包",
                icon: "🎗️",
                weight: 20,
                stock: 15
            }
        ];
        
        // 初始化数据
        function initializeData() {
            if (!localStorage.getItem('prizes')) {
                localStorage.setItem('prizes', JSON.stringify(defaultPrizes));
            }
            
            if (!localStorage.getItem('password')) {
                localStorage.setItem('password', DEFAULT_PASSWORD);
            }
            
            // 数据兼容处理：将旧版currency数据迁移到voucher
            if (localStorage.getItem('currency') && !localStorage.getItem('voucher')) {
                localStorage.setItem('voucher', localStorage.getItem('currency'));
            }
            
            // 确保有默认兑换券数据
            if (!localStorage.getItem('voucher')) {
                localStorage.setItem('voucher', '100');
                console.log('[Choujiang] initializeData: 设置默认 voucher = 100');
            } else {
                console.log('[Choujiang] initializeData: voucher 已存在 =', localStorage.getItem('voucher'));
            }

            // 初始化银行券（检查是否为有效数字）
            const bankTicketValue = localStorage.getItem('bankTicket');
            if (!bankTicketValue || bankTicketValue === 'NaN' || isNaN(parseInt(bankTicketValue))) {
                localStorage.setItem('bankTicket', '0');
                console.log("[初始化] 银行券值无效，已重置为0");
            }
            
            if (!localStorage.getItem('records')) {
                localStorage.setItem('records', JSON.stringify([]));
            }
            
            // 兼容处理：将旧版lotteryTickets数据迁移到lottery
            if (localStorage.getItem('lotteryTickets')) {
                localStorage.setItem('lottery', localStorage.getItem('lotteryTickets'));
                localStorage.removeItem('lotteryTickets');
            }
            
            if (!localStorage.getItem('lottery') || localStorage.getItem('lottery') === 'NaN' || isNaN(parseInt(localStorage.getItem('lottery')))) {
                // 不设默认值，等云端同步；如果离线模式则保持0
                const existing = parseInt(localStorage.getItem('lottery'));
                if (isNaN(existing) || existing === null) localStorage.setItem('lottery', '0');
            }
            lotteryTickets = parseInt(localStorage.getItem('lottery')) || 0;
            
            // 监听storage事件实现双向同步
            // 统一监听storage变化
            window.addEventListener('storage', function(e) {
                if (e.key === 'lottery' || e.key === 'voucher' || e.key === 'bankTicket') {
                    if (e.key === 'lottery') {
                        lotteryTickets = parseInt(e.newValue || '0');
                    }
                    updateUI();
                }
            });
        }
        
        // 显示状态通知
        function showStatus(message, type = "success") {
            const notification = document.getElementById('statusNotification');
            notification.textContent = message;
            notification.className = `status-notification status-${type}`;
            notification.style.opacity = "1";
            notification.style.transform = "translateY(0)";
            
            setTimeout(() => {
                notification.style.opacity = "0";
                notification.style.transform = "translateY(-20px)";
            }, 3000);
        }
        
        // 更新界面显示
        function updateUI() {
            // 更新兑换券显示（使用voucher键名）
            const voucher = parseInt(localStorage.getItem('voucher') || '100');
            lotteryTickets = parseInt(localStorage.getItem('lottery') || '0');
            console.log('[Choujiang] updateUI - voucher:', voucher, 'lottery:', lotteryTickets);
            document.getElementById('currencyAmount').textContent = voucher;
            document.getElementById('ticketAmount').textContent = lotteryTickets;
            
            // 更新奖品显示
            updatePrizesContainer();
            updateManagePrizesContainer();
            
            // 更新抽奖记录
            updateRecords();
        }
        
        // 更新抽奖奖品容器
        function updatePrizesContainer() {
            const prizes = JSON.parse(localStorage.getItem('prizes')) || [];
            const container = document.getElementById('prizesContainer');
            if (!container) return;
            container.innerHTML = '';
            
            prizes.forEach(prize => {
                const prizeCard = document.createElement('div');
                prizeCard.className = 'prize-card';
                
                // 显示库存信息
                const stockText = prize.stock === -1 ? "无限库存" : `库存: ${prize.stock}`;

                let rewardTag = '';
                if (prize.rewardType === 'currency') {
                    rewardTag = `<div class="reward-tag">${prize.currencyAmount || 0}兑换券</div>`;
                } else if (prize.rewardType === 'bankTicket') {
                    rewardTag = `<div class="reward-tag" style="background: linear-gradient(135deg, #ff6b9d 0%, #ff9a9e 100%);">${prize.currencyAmount || 0}银行券</div>`;
                }

                prizeCard.innerHTML = `
                    <div class="prize-icon">${prize.icon}</div>
                    <div class="prize-name">${prize.name}</div>
                    <div class="prize-weight">权重: ${prize.weight}</div>
                    <div class="prize-stock">${stockText}</div>
                    <div class="prize-description">${prize.description}</div>
                    ${rewardTag}
                `;
                container.appendChild(prizeCard);
            });
        }
        
        // 更新管理奖品容器
        function updateManagePrizesContainer() {
            const prizes = JSON.parse(localStorage.getItem('prizes')) || [];
            const container = document.getElementById('managePrizesContainer');
            if (!container) return;
            container.innerHTML = '';
            
            prizes.forEach(prize => {
                const prizeCard = document.createElement('div');
                prizeCard.className = 'prize-card';
                prizeCard.dataset.id = prize.id;
                
                // 显示库存信息
                const stockText = prize.stock === -1 ? "无限库存" : `库存: ${prize.stock}`;

                let rewardTag = '';
                if (prize.rewardType === 'currency') {
                    rewardTag = `<div class="reward-tag">${prize.currencyAmount || 0}兑换券</div>`;
                } else if (prize.rewardType === 'bankTicket') {
                    rewardTag = `<div class="reward-tag" style="background: linear-gradient(135deg, #ff6b9d 0%, #ff9a9e 100%);">${prize.currencyAmount || 0}银行券</div>`;
                }

                // 创建确认删除层
                prizeCard.innerHTML = `
                    <div class="prize-icon">${prize.icon}</div>
                    <div class="prize-name">${prize.name}</div>
                    <div class="prize-weight">权重: ${prize.weight}</div>
                    <div class="prize-stock">${stockText}</div>
                    <div class="prize-description">${prize.description}</div>
                    ${rewardTag}

                    <div class="delete-confirm">
                        <p>确定删除该奖品？</p>
                        <div class="delete-buttons">
                            <button class="btn btn-danger delete-yes" data-id="${prize.id}">删除</button>
                            <button class="btn delete-cancel">取消</button>
                        </div>
                    </div>

                    <div class="prize-edit" data-id="${prize.id}" title="编辑">✏️</div>
                    <div class="prize-delete" title="删除">X</div>
                `;
                container.appendChild(prizeCard);

                // 绑定编辑按钮
                const editBtn = prizeCard.querySelector('.prize-edit');
                editBtn.addEventListener('click', function() {
                    openEditPrizeModal(prize.id);
                });

                // 直接绑定删除确认按钮
                const deleteBtn = prizeCard.querySelector('.prize-delete');
                deleteBtn.addEventListener('click', function() {
                    prizeCard.querySelector('.delete-confirm').style.display = 'flex';
                });

                // 绑定确认删除按钮
                const deleteYes = prizeCard.querySelector('.delete-yes');
                deleteYes.addEventListener('click', function() {
                    deletePrize(prize.id);
                });

                // 绑定取消删除按钮
                const deleteCancel = prizeCard.querySelector('.delete-cancel');
                deleteCancel.addEventListener('click', function() {
                    prizeCard.querySelector('.delete-confirm').style.display = 'none';
                });
            });
        }
        
        // 更新抽奖记录
        function updateRecords() {
            const records = JSON.parse(localStorage.getItem('records')) || [];
            const recordsList = document.getElementById('recordsList');
            if (!recordsList) return;
            recordsList.innerHTML = '';
            
            if (records.length === 0) {
                recordsList.innerHTML = '<p style="text-align: center; padding: 20px;">暂无抽奖记录</p>';
                return;
            }
            
            records.slice().reverse().forEach((record, index) => {
                const recordElement = document.createElement('div');
                recordElement.className = 'record-item';

                // 检查是否已使用
                const isUsed = record.used || false;
                const usedTime = record.usedTime ? new Date(record.usedTime).toLocaleString() : '';

                // 检查是否可使用(如果记录没有usable属性，默认为true)
                // 银行券和兑换券是货币类型，不可使用
                const isUsable = record.usable !== false && record.rewardType !== 'currency' && record.rewardType !== 'bankTicket';

                let rewardTag = '';
                if (record.rewardType === 'currency') {
                    rewardTag = `<div class="reward-tag">${record.currencyAmount}兑换券</div>`;
                } else if (record.rewardType === 'bankTicket') {
                    rewardTag = `<div class="reward-tag" style="background: linear-gradient(135deg, #ff6b9d 0%, #ff9a9e 100%);">${record.currencyAmount || 0}银行券</div>`;
                }

                // 如果是奖品、可使用且未使用，显示使用按钮；否则显示已使用状态或不可使用不显示按钮
                let useButton = '';
                if (isUsable && !isUsed) {
                    // 可使用且未使用
                    useButton = `
                        <button class="btn use-btn" data-index="${index}" style="padding: 10px 20px; font-size: 1rem; background: linear-gradient(135deg, #06d6a0, #48dbfb); border: 2px solid #06d6a0; box-shadow: 0 4px 8px rgba(6, 214, 160, 0.3);">
                            🎁 使用奖品
                        </button>
                    `;
                } else if (isUsed) {
                    // 已使用
                    useButton = `
                        <div class="used-status" style="background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; padding: 8px 16px; border-radius: 15px; font-size: 0.9rem; text-align: center; box-shadow: 0 4px 8px rgba(127, 140, 141, 0.3);">
                            已使用<br><small style="font-size: 0.7rem;">${usedTime}</small>
                        </div>
                    `;
                }
                // 不可使用的奖品不显示任何按钮(useButton为空字符串)

                recordElement.innerHTML = `
                    <div style="flex: 1;">
                        <div class="record-prize" style="${isUsed ? 'text-decoration: line-through; color: #95a5a6;' : ''}">${record.prize}</div>
                        ${rewardTag}
                        <div class="record-date">${new Date(record.date).toLocaleString()}</div>
                    </div>
                    ${useButton}
                `;
                recordsList.appendChild(recordElement);
            });
            
            // 使用事件委托绑定使用按钮事件 - 更可靠的方式
            bindUseButtonEvents();
        }
        
        // 绑定使用按钮事件（使用事件委托）
        function bindUseButtonEvents() {
            const recordsList = document.getElementById('recordsList');
            
            // 移除之前的事件监听器（避免重复绑定）
            recordsList.removeEventListener('click', handleUseButtonClick);
            
            // 添加新的事件监听器
            recordsList.addEventListener('click', handleUseButtonClick);
        }
        
        // 处理使用按钮点击事件
        function handleUseButtonClick(event) {
            const useButton = event.target.closest('.use-btn');
            if (useButton) {
                event.preventDefault();
                const recordIndex = parseInt(useButton.dataset.index);
                console.log('检测到使用按钮点击，索引:', recordIndex);
                markAsUsed(recordIndex);
            }
        }
        
        // 标记奖品为已使用
        function markAsUsed(recordIndex) {
            console.log('markAsUsed called with display index:', recordIndex);

            const records = JSON.parse(localStorage.getItem('records'));
            console.log('Total records:', records.length);

            // recordIndex是反向显示的索引，需要转换为正向索引
            // 反向显示：index 0 = 最后一条记录，index 1 = 倒数第二条...
            // 正向索引：index 0 = 第一条记录，index 1 = 第二条...
            const actualIndex = records.length - 1 - recordIndex;
            console.log('Converted to actual index:', actualIndex);

            // 检查记录是否存在
            if (!records[actualIndex]) {
                console.log('记录不存在，索引:', actualIndex);
                showStatus('记录不存在，无法使用此奖品', "error");
                return;
            }

            const record = records[actualIndex];

            // 调试信息：显示记录详情
            console.log('当前记录详情:', record);
            console.log('rewardType值:', record.rewardType);
            console.log('rewardType类型:', typeof record.rewardType);

            // 检查是否已经使用过
            if (record.used) {
                console.log('奖品已经使用过:', record);
                return; // 直接返回，不显示任何提示
            }

            const prizeName = record.prize;

            // 直接标记为已使用，不再询问确认（确保基础功能可用）
            record.used = true;
            record.usedTime = new Date().toISOString();

            localStorage.setItem('records', JSON.stringify(records));

            // 局部更新当前记录，不重新渲染整个列表
            updateSingleRecord(actualIndex);

            // 添加庆祝效果（不显示提示消息）
            createConfetti();
        }

        // 局部更新单个记录（避免重新渲染整个列表）
        function updateSingleRecord(actualIndex) {
            const records = JSON.parse(localStorage.getItem('records'));
            const record = records[actualIndex];
            if (!record) return;

            const usedTime = record.usedTime ? new Date(record.usedTime).toLocaleString() : '';

            // actualIndex是正向索引，需要转换为反向显示的索引
            const displayIndex = records.length - 1 - actualIndex;
            const recordElements = document.querySelectorAll('.record-item');
            const recordElement = recordElements[displayIndex];

            if (recordElement) {
                // 更新奖品名称样式（添加删除线和灰色）
                const prizeElement = recordElement.querySelector('.record-prize');
                if (prizeElement) {
                    prizeElement.style.textDecoration = 'line-through';
                    prizeElement.style.color = '#95a5a6';
                }

                // 找到按钮并替换为已使用状态
                const useButton = recordElement.querySelector('.use-btn');
                if (useButton) {
                    // 创建已使用状态的div
                    const usedStatus = document.createElement('div');
                    usedStatus.className = 'used-status';
                    usedStatus.style.cssText = 'background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; padding: 8px 16px; border-radius: 15px; font-size: 0.9rem; text-align: center; box-shadow: 0 4px 8px rgba(127, 140, 141, 0.3);';
                    usedStatus.innerHTML = `已使用<br><small style="font-size: 0.7rem;">${usedTime}</small>`;

                    // 替换按钮
                    useButton.parentNode.replaceChild(usedStatus, useButton);
                }
            }
        }

        // 创建彩色纸屑效果
        function createConfetti() {
            const container = document.querySelector('.container');
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = getRandomColor();
                confetti.style.width = `${Math.random() * 10 + 5}px`;
                confetti.style.height = `${Math.random() * 10 + 5}px`;
                container.appendChild(confetti);
                
                // 移除动画结束后元素
                setTimeout(() => {
                    confetti.remove();
                }, 1500);
            }
        }
        
        // 获取随机颜色
        function getRandomColor() {
            const colors = [
                '#ff6b6b', '#48dbfb', '#1dd1a1', '#ff9ff3', 
                '#feca57', '#ff9f43', '#00d2d3'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 切换标签页
        function switchTab(tabId) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 取消所有标签的激活状态
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(tabId).classList.add('active');
            
            // 激活选中的标签
            document.querySelector(`.nav-tab[data-tab="${tabId}"]`).classList.add('active');
            
            // 如果切换到抽奖记录标签页，更新记录
            if (tabId === 'records') {
                updateRecords();
            }
        }
        
        // 打开添加奖品模态框
        function openAddPrizeModal() {
            editingPrizeId = null; // 重置编辑状态
            document.getElementById('prizeModalTitle').textContent = '添加新奖品';
            document.getElementById('confirmAddPrizeBtn').textContent = '添加奖品';

            document.getElementById('addPrizeModal').style.display = 'flex';
            document.getElementById('prizeName').value = '';
            document.getElementById('prizeWeight').value = '10';
            document.getElementById('prizeStock').value = '-1';
            document.getElementById('prizeRewardType').value = 'item';
            document.getElementById('currencyAmountInput').value = '';
            document.getElementById('currencyAmountGroup').style.display = 'none';
            document.getElementById('prizeUsable').value = 'true'; // 默认可使用
            document.getElementById('prizeDescription').value = '';
        }
        
        // 关闭添加奖品模态框
        function closeAddPrizeModal() {
            document.getElementById('addPrizeModal').style.display = 'none';
            editingPrizeId = null; // 重置编辑状态
        }
        
        // 单次抽奖
        function startSingleLottery() {
            if (lotteryTickets >= 1) {
                // 直接使用抽奖券
                lotteryTickets--;
                localStorage.setItem('lottery', lotteryTickets.toString());
                updateUI();
                performLottery(1);
            } else {
                // 询问是否用兑换券购买
                const voucher = parseInt(localStorage.getItem('voucher') || '100');
                if (voucher >= EXCHANGE_RATE) {
                    document.getElementById('exchangeModalTitle').textContent = '兑换券购买确认';
                    document.getElementById('exchangeModalText').textContent = 
                        '抽奖券不足！确定要用200兑换券购买1张抽奖券吗？';
                    document.getElementById('exchangeModal').style.display = 'flex';
                } else {
                    showStatus('抽奖券不足且兑换券也不足！', "error");
                }
            }
        }

        // 多次抽奖
        function startMultiLottery() {
            if (lotteryTickets >= 10) {
                // 直接使用抽奖券
                lotteryTickets -= 10;
                localStorage.setItem('lottery', lotteryTickets.toString());
                updateUI();
                performLottery(10);
            } else {
                // 计算需要补充的抽奖券数量
                const neededTickets = 10 - lotteryTickets;
                const totalCost = neededTickets * EXCHANGE_RATE;
                const voucher = parseInt(localStorage.getItem('voucher') || '100');
                
                if (voucher >= totalCost) {
                    document.getElementById('exchangeModalTitle').textContent = '兑换券购买确认';
                    document.getElementById('exchangeModalText').textContent = 
                        `抽奖券不足！需要补充${neededTickets}张抽奖券，确定要用${totalCost}兑换券购买吗？`;
                    document.getElementById('exchangeModal').style.display = 'flex';
                } else {

        function performLottery(times) {
            const actionMessage = document.getElementById('actionMessage');

            setTimeout(() => {

                for (let i = 0; i < times; i++) {

                }
                
                // 处理奖品
                processPrizes(prizes);
                
                // 根据抽奖次数显示对应结果
                if (times === 1) {
                    showSingleLotteryResult(prizes[0]);
                } else {
                    showMultiLotteryResult(prizes);

        // 处理奖品结果
        function processPrizes(prizes) {
            const records = JSON.parse(localStorage.getItem('records'));
            let currencyEarned = 0;
            let bankTicketEarned = 0;

            prizes.forEach(prize => {
                records.push({
                    prize: prize.name,
                    rewardType: prize.rewardType,
                    currencyAmount: prize.currencyAmount,
                    usable: prize.usable !== false, // 默认为true，如果奖品没有设置usable属性则默认可使用
                    date: new Date().toISOString()
                });

                if (prize.rewardType === 'currency') {
                    currencyEarned += prize.currencyAmount;
                } else if (prize.rewardType === 'bankTicket') {
                    bankTicketEarned += prize.currencyAmount;
                }
                
                // 减少库存
                if (prize.stock !== -1) {
                    const allPrizes = JSON.parse(localStorage.getItem('prizes'));
                    const updatedPrizes = allPrizes.map(p => {
                        if (p.id === prize.id && p.stock > 0) {
                            return {...p, stock: p.stock - 1};
                        }
                        return p;
                    });
                    localStorage.setItem('prizes', JSON.stringify(updatedPrizes));
                }
            });
            
            // 更新记录
            localStorage.setItem('records', JSON.stringify(records));

            // 显示奖励消息
            let rewardMessages = [];
            if (currencyEarned > 0) {
                const voucher = parseInt(localStorage.getItem('voucher') || '100');
                const newVoucher = voucher + currencyEarned;
                localStorage.setItem('voucher', newVoucher.toString());
                syncCurrencyToCloud('voucher');
                document.getElementById('currencyAmount').textContent = newVoucher;

                // 触发storage事件同步到其他页面
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'voucher',
                    newValue: newVoucher.toString()
                }));

                rewardMessages.push(`${currencyEarned}兑换券`);
            }
            if (bankTicketEarned > 0) {
                const bankTicket = parseInt(localStorage.getItem('bankTicket') || '0') || 0;
                const newBankTicket = bankTicket + bankTicketEarned;

                // 安全检查：确保newBankTicket是有效数字
                if (!isNaN(newBankTicket) && newBankTicket >= 0) {
                    localStorage.setItem('bankTicket', newBankTicket.toString());
                    syncCurrencyToCloud('bankTicket');

                    // 触发storage事件同步到银行页面
                    window.dispatchEvent(new StorageEvent('storage', {
                        key: 'bankTicket',
                        newValue: newBankTicket.toString()
                    }));
                }

                rewardMessages.push(`${bankTicketEarned}银行券`);
            }
            if (rewardMessages.length > 0) {
                showStatus(`成功获得${rewardMessages.join('、')}！`, "success");
            }
            
            // 触发UI更新
            updateUI();
            
            // 显示结果
            showMultiLotteryResult(prizes);
            updateUI();
        }

        // 随机获取奖品
        function getRandomPrize() {
            const prizes = JSON.parse(localStorage.getItem('prizes'));
            
            // 过滤掉库存为0的奖品
            const availablePrizes = prizes.filter(prize => 
                prize.stock === -1 || prize.stock > 0
            );
            
            if (availablePrizes.length === 0) {
                return {
                    id: 0,
                    name: "无奖品",
                    rewardType: "item",
                    currencyAmount: 0,
                    description: "暂无可用奖品",
                    icon: "❓",
                    weight: 100,
                    stock: -1
                };
            }
            
            let totalWeight = 0;
            
            // 计算总权重
            availablePrizes.forEach(prize => {
                totalWeight += prize.weight;
            });
            
            // 生成随机数
            const random = Math.random() * totalWeight;
            
            // 选择奖品
            let currentWeight = 0;
            for (const prize of availablePrizes) {
                currentWeight += prize.weight;
                if (random <= currentWeight) {
                    return prize;
                }
            }
            
            // 默认返回第一个奖品
            return availablePrizes[0];
        }

                            const localRaw = localStorage.getItem(key);
                            const localVal = localRaw !== null ? parseFloat(localRaw) : null;
                            
                            // 本地为空 或 云端值与本地值不同，都更新
                            if (localVal === null || isNaN(localVal) || cloudVal !== localVal) {
                                localStorage.setItem(key, String(cloudVal));
                                console.log(`[Choujiang] 💰 同步货币 ${key}: ${localVal} → ${cloudVal}`);
                                hasUpdate = true;
                            }
                        }
                    });
                }
                
                // 同步抽奖记录
                if (lotteryRecords && lotteryRecords.length > 0) {
                    const normalRecords = lotteryRecords.filter(r => r.pool_type === 'normal' || !r.pool_type);
                    
                    // 转换格式并保存
                    const normalFormatted = normalRecords.map(r => ({
                        prize: { name: r.prize_name, rewardType: 'item' },
                        date: r.prize_date,
                        used: r.used || false,
                        rewardType: 'item'
                    }));
                    
                    // 检查本地是否有记录，如果没有或云端更多，则使用云端
                    const localNormal = JSON.parse(localStorage.getItem('records') || '[]');
                    
                    if (normalFormatted.length > localNormal.length) {
                        localStorage.setItem('records', JSON.stringify(normalFormatted));
                        console.log(`[Choujiang] 🎁 同步抽奖记录: ${localNormal.length} → ${normalFormatted.length}`);
                        hasUpdate = true;
                    }
                }
                
                console.log('[Choujiang] ✅ 云端数据同步完成');
                console.log('[Choujiang] 同步后 localStorage - voucher:', localStorage.getItem('voucher'), 'lottery:', localStorage.getItem('lottery'));
                
                // 刷新UI（无论是否有更新都刷新，确保显示正确）
                updateUI();
                updateRecords();
                
            } catch (e) {
                console.error('[Choujiang] ❌ 云端同步失败:', e);
            }
        }
        
        // 当DOM加载完成后启动应用
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
            // 从云端加载数据（延迟一点确保Supabase已加载）
            setTimeout(loadDataFromCloud, 100);
        });

    </script>
</body>
</html>
