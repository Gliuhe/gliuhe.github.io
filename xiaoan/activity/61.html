<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六一儿童节 - 超级兑换券乐园</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Marker Felt', 'Arial Rounded MT Bold', sans-serif;
        }

        :root {
            --primary-color: #ff6b9d;
            --secondary-color: #ffd93d;
            --accent-color: #6c5ce7;
        }

        body {
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('61.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 107, 157, 0.3) 0%,
                rgba(255, 217, 61, 0.4) 50%,
                rgba(108, 92, 231, 0.7) 100%
            );
            z-index: -1;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.9);
            color: #ff6b9d;
            backdrop-filter: blur(10px);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-claim {
            background: linear-gradient(135deg, #ff6b9d, #ffd93d);
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }

        .btn-claim:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }

        .btn-claim:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 100px 20px 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .event-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .event-title {
            font-size: 3rem;
            color: white;
            text-shadow:
                -2px -2px 0 rgba(0,0,0,0.3),
                2px -2px 0 rgba(0,0,0,0.3),
                -2px 2px 0 rgba(0,0,0,0.3),
                2px 2px 0 rgba(0,0,0,0.3),
                0 4px 15px rgba(0, 0, 0, 0.4);
            animation: bounceTitle 2s ease-in-out infinite;
        }

        @keyframes bounceTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .event-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 8px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .event-dates {
            font-size: 1rem;
            color: var(--secondary-color);
            margin-top: 10px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 任务卡片区域 */
        .tasks-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 107, 157, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
        }

        .task-card.completed {
            border-color: #06d6a0;
            background: rgba(6, 214, 160, 0.1);
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .task-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 1.3rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .task-desc {
            font-size: 0.95rem;
            color: #666;
            margin-top: 4px;
        }

        .task-reward {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd93d, #ff6b9d);
            color: white;
            margin-top: 8px;
        }

        .task-progress {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #ffd93d);
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #666;
            min-width: 60px;
            text-align: right;
        }

        .task-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #06d6a0;
            color: white;
        }

        /* 欢迎卡片弹窗 */
        .welcome-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .welcome-modal.active {
            display: flex;
        }

        .welcome-card {
            background: linear-gradient(135deg, #ff6b9d 0%, #ffd93d 100%);
            border-radius: 30px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            animation: popIn 0.5s ease;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.4);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .welcome-icon {
            font-size: 5rem;
            animation: bounceIcon 1s ease-in-out infinite;
        }

        @keyframes bounceIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        .welcome-title {
            font-size: 2rem;
            color: white;
            margin: 20px 0 10px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .welcome-message {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.95);
            line-height: 1.6;
            margin-bottom: 20px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.1);
        }

        .welcome-reward {
            background: rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
        }

        .welcome-reward-icon {
            font-size: 2.5rem;
        }

        .welcome-reward-text {
            font-size: 1.1rem;
            color: white;
            font-weight: bold;
            margin-top: 5px;
        }

        .btn-claim-reward {
            background: white;
            color: #ff6b9d;
            padding: 14px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-claim-reward:hover {
            transform: scale(1.05);
        }

        .welcome-card.claimed .btn-claim-reward {
            background: #06d6a0;
            color: white;
        }

        /* 庆典邀请券 */
        .celebration-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 2px solid var(--secondary-color);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .celebration-title {
            font-size: 1.5rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .celebration-desc {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
        }

        .celebration-ticket {
            display: inline-block;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .celebration-ticket.claimed {
            background: #06d6a0;
        }

        /* 彩纸动画 */
        .confetti {
            position: fixed;
            top: -20px;
            z-index: 3100;
            width: 10px;
            height: 10px;
            opacity: 0.8;
            pointer-events: none;
            animation: confettiFall 3s ease-in-out forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .event-title {
                font-size: 2rem;
            }

            .container {
                padding: 80px 15px 30px;
            }

            .task-card {
                padding: 18px;
            }

            .task-icon {
                font-size: 2rem;
            }

            .task-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="back-btn">
        <button class="btn btn-primary" onclick="window.location.href='/xiaoan'">🏠 返回主页</button>
    </div>

    <div class="container">
        <div class="event-header">
            <h1 class="event-title">🎈 六一儿童节快乐 🎈</h1>
            <p class="event-subtitle">童年只有一次，快乐每一天！</p>
            <p class="event-dates">📅 活动时间：2026年5月30日 ~ 2026年6月7日</p>
        </div>

        <div class="tasks-section">
            <div class="task-card" id="task1">
                <div class="task-header">
                    <div class="task-icon">📚</div>
                    <div class="task-info">
                        <div class="task-title">书中乐趣</div>
                        <div class="task-desc">完成一次读书，体验阅读的快乐</div>
                    </div>
                </div>
                <div class="task-reward">奖励：200 兑换券</div>
                <div class="task-progress" id="task1Progress">
                    <div class="progress-bar"><div class="progress-fill" id="task1Fill" style="width: 0%"></div></div>
                    <div class="progress-text" id="task1Text">0/1</div>
                </div>
            </div>

            <div class="task-card" id="task2">
                <div class="task-header">
                    <div class="task-icon">✏️</div>
                    <div class="task-info">
                        <div class="task-title">书中芬芳</div>
                        <div class="task-desc">完成当日作业，书写你的未来</div>
                    </div>
                </div>
                <div class="task-reward">奖励：10 抽奖券</div>
                <div class="task-progress" id="task2Progress">
                    <div class="progress-bar"><div class="progress-fill" id="task2Fill" style="width: 0%"></div></div>
                    <div class="progress-text" id="task2Text">0/1</div>
                </div>
            </div>

            <div class="task-card" id="task3">
                <div class="task-header">
                    <div class="task-icon">🧮</div>
                    <div class="task-info">
                        <div class="task-title">趣味运算</div>
                        <div class="task-desc">完成5篇计算题，挑战数学的乐趣</div>
                    </div>
                </div>
                <div class="task-reward">每次奖励：1 高级抽奖券（可完成5次）</div>
                <div class="task-progress" id="task3Progress">
                    <div class="progress-bar"><div class="progress-fill" id="task3Fill" style="width: 0%"></div></div>
                    <div class="progress-text" id="task3Text">0/5</div>
                </div>
            </div>
        </div>

        <div class="celebration-section">
            <div class="celebration-title">🎊 庆典前瞻</div>
            <div class="celebration-desc">完成所有儿童节任务，即可获得庆典邀请券！</div>
            <div id="celebrationTicket"></div>
        </div>
    </div>

    <!-- 欢迎卡片弹窗 -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="welcome-card" id="welcomeCard">
            <div class="welcome-icon">🎉</div>
            <h2 class="welcome-title">六一儿童节快乐！</h2>
            <p class="welcome-message">亲爱的同学，愿你像小鸟一样自由飞翔，<br>像花朵一样灿烂绽放！<br>今天是你专属的日子，尽情享受吧！</p>
            <div class="welcome-reward">
                <div class="welcome-reward-icon">🎮</div>
                <div class="welcome-reward-text">获得：1张 单日游戏时间卡</div>
            </div>
            <button class="btn-claim-reward" id="claimWelcomeBtn" onclick="claimWelcomeReward()">🎁 领取奖励</button>
        </div>
    </div>

    <script>
        const ACTIVITY_START = new Date('2026-05-30');
        const ACTIVITY_END = new Date('2026-06-07 23:59:59');

        function isActivityActive() {
            const now = new Date();
            return now >= ACTIVITY_START && now <= ACTIVITY_END;
        }

        function getChildrensData() {
            const defaultData = {
                task1Completed: false,
                task2Completed: false,
                task3Count: 0,
                welcomeClaimed: false,
                celebrationClaimed: false
            };
            const saved = localStorage.getItem('childrens61Data');
            return saved ? JSON.parse(saved) : defaultData;
        }

        function saveChildrensData(data) {
            localStorage.setItem('childrens61Data', JSON.stringify(data));
        }

        function init() {
            const data = getChildrensData();

            if (!data.welcomeClaimed) {
                document.getElementById('welcomeModal').classList.add('active');
            } else {
                document.getElementById('welcomeModal').classList.remove('active');
            }

            updateTaskUI();
            checkCelebration();
        }

        function claimWelcomeReward() {
            const data = getChildrensData();
            if (data.welcomeClaimed) return;

            data.welcomeClaimed = true;
            saveChildrensData(data);

            // 发放单日游戏时间卡到背包
            let records = JSON.parse(localStorage.getItem('records') || '[]');
            records.push({
                prize: { name: '单日游戏时间卡', icon: '🎮', description: '儿童节特别奖励 - 可以在一天内使用' },
                rewardType: 'game_time_card',
                usable: true,
                isExchangeItem: false,
                used: false,
                usedTime: null,
                date: new Date().toISOString(),
                icon: '🎮',
                description: '儿童节特别奖励 - 可以在一天内使用',
                _source: 'normal',
                _sourceLabel: '儿童节活动'
            });
            localStorage.setItem('records', JSON.stringify(records));

            const btn = document.getElementById('claimWelcomeBtn');
            btn.textContent = '✅ 已领取';
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('welcomeModal').classList.remove('active');
            }, 1000);

            createConfetti();
        }

        function completeTask1() {
            const data = getChildrensData();
            if (data.task1Completed) return;

            data.task1Completed = true;
            saveChildrensData(data);

            // 发放200兑换券
            const current = parseInt(localStorage.getItem('voucher') || '0');
            localStorage.setItem('voucher', String(current + 200));

            // 同步到云端
            syncCurrency('voucher', current + 200);

            updateTaskUI();
            checkCelebration();
            showStatus('✅ 书中乐趣完成！获得200兑换券！', 'success');
            createConfetti();
        }

        function completeTask2() {
            const data = getChildrensData();
            if (data.task2Completed) return;

            data.task2Completed = true;
            saveChildrensData(data);

            // 发放10抽奖券
            const current = parseInt(localStorage.getItem('lottery') || '0');
            localStorage.setItem('lottery', String(current + 10));

            // 同步到云端
            syncCurrency('lottery', current + 10);

            updateTaskUI();
            checkCelebration();
            showStatus('✅ 书中芬芳完成！获得10抽奖券！', 'success');
            createConfetti();
        }

        function completeTask3() {
            const data = getChildrensData();
            if (data.task3Count >= 5) return;

            data.task3Count++;
            saveChildrensData(data);

            // 每次发放1高级抽奖券
            const current = parseInt(localStorage.getItem('premium') || '0');
            localStorage.setItem('premium', String(current + 1));

            // 同步到云端
            syncCurrency('premium', current + 1);

            updateTaskUI();
            checkCelebration();
            showStatus(`✅ 趣味运算进度 ${data.task3Count}/5！获得1高级抽奖券！`, 'success');
            createConfetti();
        }

        function checkCelebration() {
            const data = getChildrensData();
            const allCompleted = data.task1Completed && data.task2Completed && data.task3Count >= 5;
            const ticketEl = document.getElementById('celebrationTicket');

            if (data.celebrationClaimed) {
                ticketEl.innerHTML = '<div class="celebration-ticket claimed">🎫 已获得庆典邀请券</div>';
                return;
            }

            if (allCompleted) {
                // 发放庆典邀请券
                data.celebrationClaimed = true;
                saveChildrensData(data);

                // 放入背包
                let records = JSON.parse(localStorage.getItem('records') || '[]');
                records.push({
                    prize: { name: '庆典邀请券', icon: '🎫', description: '用于开启某日活动的关键入场券...' },
                    rewardType: 'celebration_ticket',
                    usable: true,
                    isExchangeItem: false,
                    used: false,
                    usedTime: null,
                    date: new Date().toISOString(),
                    icon: '🎫',
                    description: '用于开启某日活动的关键入场券...',
                    _source: 'normal',
                    _sourceLabel: '儿童节活动'
                });
                localStorage.setItem('records', JSON.stringify(records));

                ticketEl.innerHTML = '<div class="celebration-ticket claimed">🎫 已获得庆典邀请券</div>';
                showStatus('🎊 恭喜！所有任务完成！获得庆典邀请券！', 'success');
                createConfetti();
            } else {
                const tasksLeft = [];
                if (!data.task1Completed) tasksLeft.push('书中乐趣');
                if (!data.task2Completed) tasksLeft.push('书中芬芳');
                if (data.task3Count < 5) tasksLeft.push('趣味运算');
                ticketEl.innerHTML = `<div class="celebration-ticket">🔒 还需完成：${tasksLeft.join('、')}</div>`;
            }
        }

        function updateTaskUI() {
            const data = getChildrensData();

            // Task 1
            const task1El = document.getElementById('task1');
            const task1Fill = document.getElementById('task1Fill');
            const task1Text = document.getElementById('task1Text');
            if (data.task1Completed) {
                task1El.classList.add('completed');
                task1Fill.style.width = '100%';
                task1Text.innerHTML = '<span class="task-status">✅ 已完成</span>';
            } else {
                task1El.classList.remove('completed');
                task1Fill.style.width = '0%';
                task1Text.textContent = '0/1';
                task1Text.onclick = completeTask1;
                task1Text.style.cursor = 'pointer';
            }

            // Task 2
            const task2El = document.getElementById('task2');
            const task2Fill = document.getElementById('task2Fill');
            const task2Text = document.getElementById('task2Text');
            if (data.task2Completed) {
                task2El.classList.add('completed');
                task2Fill.style.width = '100%';
                task2Text.innerHTML = '<span class="task-status">✅ 已完成</span>';
            } else {
                task2El.classList.remove('completed');
                task2Fill.style.width = '0%';
                task2Text.textContent = '0/1';
                task2Text.onclick = completeTask2;
                task2Text.style.cursor = 'pointer';
            }

            // Task 3
            const task3El = document.getElementById('task3');
            const task3Fill = document.getElementById('task3Fill');
            const task3Text = document.getElementById('task3Text');
            const progress = (data.task3Count / 5) * 100;
            task3Fill.style.width = `${progress}%`;
            if (data.task3Count >= 5) {
                task3El.classList.add('completed');
                task3Text.innerHTML = '<span class="task-status">✅ 已完成</span>';
            } else {
                task3Text.textContent = `${data.task3Count}/5`;
                task3Text.onclick = completeTask3;
                task3Text.style.cursor = 'pointer';
            }
        }

        function createConfetti() {
            const colors = ['#ff6b9d', '#ffd93d', '#6c5ce7', '#06d6a0', '#ff9a9e', '#a29bfe'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function showStatus(message, type = 'success') {
            let banner = document.getElementById('statusBanner');
            if (!banner) {
                banner = document.createElement('div');
                banner.id = 'statusBanner';
                banner.style.cssText = `
                    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
                    background: #06d6a0; color: white; padding: 12px 24px; border-radius: 25px;
                    font-size: 1rem; font-weight: bold; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    transition: all 0.3s ease;
                `;
                document.body.appendChild(banner);
            }
            banner.textContent = message;
            banner.style.opacity = '1';
