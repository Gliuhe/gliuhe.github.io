<script>
// ============ 页面配置 ============
const totalPages = 5; // 0=封面, 1-3=信纸, 4=结尾
const pageNames = ['封面', '开篇', '未来', '暑期', '结尾'];
let currentPage = 0;

// ============ 初始化导航圆点 ============
const navContainer = document.getElementById('navDots');
pageNames.forEach((name, i) => {
  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => turnPage(i);
  dot.innerHTML = `<span class="tooltip">${name}</span>`;
  navContainer.appendChild(dot);
});

// ============ 翻页核心函数 ============
function turnPage(target) {
  if (target === currentPage) return;

  // 遮罩
  const mask = document.getElementById('pageMask');
  mask.classList.add('visible');

  setTimeout(() => {
    // 切换页面
    document.getElementById(`page-${currentPage}`).classList.remove('active');
    document.getElementById(`page-${target}`).classList.add('active');
    currentPage = target;

    // 更新进度条
    const pct = (currentPage / (totalPages - 1)) * 100;
    document.getElementById('progressBar').style.width = pct + '%';

    // 更新导航圆点
    document.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('active', i === currentPage);
    });

    // 触发花瓣效果（封面→正文 或 正文→结尾）
    if (target === 1 || target === 4) createPetalStorm();

    // 如果是结尾页，额外放一波烟花效果
    if (target === 4) createFireworkStars();

    // 移除遮罩
    setTimeout(() => mask.classList.remove('visible'), 100);
  }, 500);
}

// ============ 花瓣风暴 ============
function createPetalStorm() {
  const petals = ['🌸','💮','🏵️','🌺','✿','❀','🍃'];
  for (let i = 0; i < 40; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.textContent = petals[Math.floor(Math.random() * petals.length)];
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.fontSize = (14 + Math.random() * 18) + 'px';
    petal.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
    petal.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    petal.style.animationDuration = (3 + Math.random() * 4) + 's';
    petal.style.animationDelay = (Math.random() * 2) + 's';
    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 8000);
  }
}

// ============ 结尾烟花星星 ============
function createFireworkStars() {
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + 'vw';
    star.style.top = Math.random() * 100 + 'vh';
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 5000);
  }
}

// ============ 粒子背景 ============
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.golden = Math.random() > 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.golden
      ? `rgba(212,162,78,${this.opacity})`
      : `rgba(201,123,132,${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 连线
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(212,162,78,${0.08 * (1 - dist / 120)})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ============ 键盘翻页 ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (currentPage < totalPages - 1) turnPage(currentPage + 1);
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentPage > 0) turnPage(currentPage - 1);
  }
});

// ============ 初始化进度条 ============
document.getElementById('progressBar').style.width = '0%';
</script>
